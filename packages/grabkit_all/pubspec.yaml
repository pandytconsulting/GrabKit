name: grabkit_all
description: Convenience bundle containing the standard GrabKit modules.
version: 0.1.0
publish_to: "none"
homepage: https://github.com/pandytconsulting/GrabKit
repository: https://github.com/pandytconsulting/GrabKit/tree/main/packages/grabkit_all
issue_tracker: https://github.com/pandytconsulting/GrabKit/issues

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  grabkit:
    git:
      url: https://github.com/pandytconsulting/GrabKit.git
      ref: integration/git-consumer-test
      path: .
  grabkit_environment:
    git:
      url: https://github.com/pandytconsulting/GrabKit.git
      ref: integration/git-consumer-test
      path: packages/grabkit_environment
  grabkit_export:
    git:
      url: https://github.com/pandytconsulting/GrabKit.git
      ref: integration/git-consumer-test
      path: packages/grabkit_export
  grabkit_logs:
    git:
      url: https://github.com/pandytconsulting/GrabKit.git
      ref: integration/git-consumer-test
      path: packages/grabkit_logs
  grabkit_network:
    git:
      url: https://github.com/pandytconsulting/GrabKit.git
      ref: integration/git-consumer-test
      path: packages/grabkit_network
  grabkit_network_dio:
    git:
      url: https://github.com/pandytconsulting/GrabKit.git
      ref: integration/git-consumer-test
      path: packages/grabkit_network_dio
  grabkit_realtime:
    git:
      url: https://github.com/pandytconsulting/GrabKit.git
      ref: integration/git-consumer-test
      path: packages/grabkit_realtime
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
