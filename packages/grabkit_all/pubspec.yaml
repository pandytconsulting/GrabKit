name: grabkit_all
description: Convenience bundle containing the standard GrabKit modules.
version: 0.1.0
homepage: https://github.com/pandytconsulting/GrabKit
repository: https://github.com/pandytconsulting/GrabKit/tree/main/packages/grabkit_all
issue_tracker: https://github.com/pandytconsulting/GrabKit/issues

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  grabkit: ^0.1.0
  grabkit_environment: ^0.1.0
  grabkit_export: ^0.1.0
  grabkit_logs: ^0.1.0
  grabkit_network: ^0.1.0
  grabkit_network_dio: ^0.1.0
  grabkit_realtime: ^0.1.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
