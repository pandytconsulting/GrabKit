name: grabkit_environment
description: Runtime environment switching module for GrabKit.
version: 0.1.0
publish_to: "none"
homepage: https://github.com/pandytconsulting/GrabKit
repository: https://github.com/pandytconsulting/GrabKit/tree/main/packages/grabkit_environment
issue_tracker: https://github.com/pandytconsulting/GrabKit/issues

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  grabkit:
    git:
      url: https://github.com/pandytconsulting/GrabKit.git
      ref: integration/git-consumer-test
      path: .

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
